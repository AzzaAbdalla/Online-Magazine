<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Contact Us</title>
  <link rel="stylesheet" href="css2/stylecontactus.css">


</head>

<body>
  <!-- navbar -->
  <div class="header">
    <div class="navbar">


      <ul>
        <li class="home"><a href="Home.html">Home</a></li>
        <li class="latest news"><a href="News.html">Latest News</a></li>

        <li class="cinema"><a href="cinema.html">cinema</a></li>

        <li class="sports"><a href="Sport.html">Sports</a></li>

        <li class="fashion"><a href="Fashion.html">Fashion</a></li>
        <li class="contactus"><a href="contactUs.html">Contact Us</a></li>


        <form>
          <input type="text" name="search" placeholder="Search..">
        </form>
      </ul>
    </div>
  </div>
  <!--header-->
  <center>
    <h1>Contact US</h1>
  </center>

  <!--form1-->
  <form class="form1">
    <label for="fname">First Name</label>
    <br>
    <input type="text" id="fname" name="firstname" placeholder="Your name..">
    <br>
    <label for="lname">Last Name</label>
    <br>
    <input type="text" id="lname" name="lastname" placeholder="Your last name..">
    <br>
    <label for="country">Country</label>
    <br>
    <select id="country" name="country">
      <option value="australia">Australia</option>
      <option value="canada">Canada</option>
      <option value="usa">USA</option>
    </select>
    <br>
    <label for="subject">Subject</label>
    <br>
    <textarea id="subject" name="subject" placeholder="Write something.." style="height:200px"></textarea>
    <br>
    <input type="submit" value="Submit">
  </form>
  <div>

    <!--form2-->
    <form>
      <div class="row">
        <h2 style="text-align:center">Login with Social Media or Manually</h2>
        <div class="vl">
          <span class="vl-innertext">or</span>
        </div>

        <div class="col">
          <a href="#" class="fb btn">
            <i class="fa fa-facebook fa-fw"></i> Login with Facebook
          </a>
          <a href="#" class="twitter btn">
            <i class="fa fa-twitter fa-fw"></i> Login with Twitter
          </a>
          <a href="#" class="google btn">
            <i class="fa fa-google fa-fw"></i> Login with Google+
          </a>
        </div>

        <div class="col">
          <div class="hide-md-lg">
            <p>Or sign in manually:</p>
          </div>
          <input type="text" name="username" placeholder="Username" required>
          <input type="password" name="password" placeholder="Password" required>
          <input type="submit" value="Login">
        </div>

      </div>
    </form>
  </div>

  <div class="bottom-container">
    <div class="row">
      <div class="col">
        <a href="#" style="color:white" class="btn">Sign up</a>
      </div>
      <div class="col">
        <a href="#" style="color:white" class="btn">Forgot password?</a>
      </div>
    </div>
  </div>


</body>

</html>
